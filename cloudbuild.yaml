steps:
  # Install functions dependencies
  - name: 'node:20'
    dir: 'functions'
    entrypoint: 'npm'
    args: ['ci']

  # Build functions (TypeScript to JavaScript)
  - name: 'node:20'
    dir: 'functions'
    entrypoint: 'npm'
    args: ['run', 'build']

  # Deploy functions
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gcloud functions deploy contact \
          --gen2 \
          --runtime=nodejs20 \
          --region=asia-northeast1 \
          --source=functions \
          --entry-point=contact \
          --trigger-http \
          --allow-unauthenticated \
          --set-secrets="GMAIL_SA_KEY_JSON=GMAIL_SA_KEY_JSON:latest,GMAIL_FROM=GMAIL_FROM:latest,CONTACT_EMAIL=CONTACT_EMAIL:latest"

  # Build Next.js static export
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['ci']

  - name: 'node:20'
    entrypoint: 'npm'
    args: ['run', 'build']

  # Deploy to Firebase Hosting
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - 'npm install -g firebase-tools && firebase deploy --only hosting --project=fractal-hokan-funabashi'

options:
  logging: CLOUD_LOGGING_ONLY
