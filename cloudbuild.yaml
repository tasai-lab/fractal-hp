steps:
  # Install functions dependencies
  - name: 'node:20'
    dir: 'functions'
    entrypoint: 'npm'
    args: ['ci']

  # Build functions (TypeScript to JavaScript)
  - name: 'node:20'
    dir: 'functions'
    entrypoint: 'npm'
    args: ['run', 'build']

  # Deploy functions
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gcloud functions deploy contact \
          --gen2 \
          --runtime=nodejs20 \
          --region=asia-northeast1 \
          --source=functions \
          --entry-point=contact \
          --trigger-http \
          --allow-unauthenticated \
          --set-env-vars="RESEND_API_KEY=$$RESEND_API_KEY,CONTACT_EMAIL=$$CONTACT_EMAIL,MAIL_FROM=$$MAIL_FROM"
    secretEnv:
      - 'RESEND_API_KEY'
      - 'CONTACT_EMAIL'
      - 'MAIL_FROM'

  # Build Next.js static export
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['ci']

  - name: 'node:20'
    entrypoint: 'npm'
    args: ['run', 'build']

  # Deploy to Firebase Hosting
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - 'npm install -g firebase-tools && firebase deploy --only hosting --project=fractal-hokan-funabashi'

availableSecrets:
  secretManager:
    - versionName: projects/fractal-hokan-funabashi/secrets/RESEND_API_KEY/versions/latest
      env: 'RESEND_API_KEY'
    - versionName: projects/fractal-hokan-funabashi/secrets/CONTACT_EMAIL/versions/latest
      env: 'CONTACT_EMAIL'
    - versionName: projects/fractal-hokan-funabashi/secrets/MAIL_FROM/versions/latest
      env: 'MAIL_FROM'

options:
  logging: CLOUD_LOGGING_ONLY
